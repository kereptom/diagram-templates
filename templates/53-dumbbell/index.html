<!doctype html>
<html lang="cs"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Činkový graf diagram</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232f6bff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
:root{--c-1:#2f6bff;--c-2:#5b6cf0;--c-3:#0e9e8e;--c-4:#e0468a;--c-5:#e0468a;--ink:#1c2230;--muted:#6b7280;--paper:#fff;--soft:#f5f7fb;--rule:#e4e7ee;--rule-soft:#eef1f6;--ui:"Inter Tight",system-ui,sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f5f8;color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.frame{background:var(--paper);border:1px solid var(--rule);border-radius:22px;box-shadow:0 20px 60px -30px rgba(0,0,0,.3);max-width:920px;width:100%;padding:34px 38px 28px}
.kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-1)}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px}
.cap{color:var(--muted);font-size:15px;margin-bottom:18px}
.dgm{width:100%;height:auto;display:block}
.note{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:18px;border-top:1px solid var(--rule);padding-top:14px}
.back{margin-top:24px;font-family:var(--mono);font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:var(--c-1)}
</style></head>
<body>
<div class="frame">
  <div class="kick">// dumbbell diagram</div>
  <h1>Činkový graf</h1>
  <p class="cap">Změna mezi dvěma stavy.</p>
  <svg class="dgm" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg"><line x1="425" y1="97" x2="628" y2="97" stroke="var(--rule)" stroke-width="3"/><circle cx="425" cy="97" r="8" fill="var(--c-1)"/><circle cx="628" cy="97" r="8" fill="var(--c-4)"/><text x="156" y="101.25" text-anchor="end" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">Tržby</text><line x1="310" y1="180" x2="367" y2="180" stroke="var(--rule)" stroke-width="3"/><circle cx="310" cy="180" r="8" fill="var(--c-1)"/><circle cx="367" cy="180" r="8" fill="var(--c-4)"/><text x="156" y="183.75" text-anchor="end" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">Marže</text><line x1="520" y1="262" x2="730" y2="262" stroke="var(--rule)" stroke-width="3"/><circle cx="520" cy="262" r="8" fill="var(--c-1)"/><circle cx="730" cy="262" r="8" fill="var(--c-4)"/><text x="156" y="266.25" text-anchor="end" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">Klienti</text><line x1="386" y1="345" x2="558" y2="345" stroke="var(--rule)" stroke-width="3"/><circle cx="386" cy="345" r="8" fill="var(--c-1)"/><circle cx="558" cy="345" r="8" fill="var(--c-4)"/><text x="156" y="348.75" text-anchor="end" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">NPS</text><rect x="170" y="28" width="13" height="13" rx="3" fill="var(--c-1)"/><text x="189" y="39" text-anchor="start" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">2023</text><rect x="280" y="28" width="13" height="13" rx="3" fill="var(--c-4)"/><text x="299" y="39" text-anchor="start" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">2026</text></svg>
  <div class="note">// data-driven SVG &middot; ukázková data (dummy) &middot; uprav data v build/content.py</div>
</div>
<a class="back" href="../../index.html">&larr; zpět na galerii</a>
</body></html>
