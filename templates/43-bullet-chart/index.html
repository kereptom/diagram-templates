<!doctype html>
<html lang="cs"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terčový graf diagram</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232f6bff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
:root{--c-1:#2f6bff;--c-2:#5b6cf0;--c-3:#0e9e8e;--c-4:#f0883a;--c-5:#e0468a;--ink:#1c2230;--muted:#6b7280;--paper:#fff;--soft:#f5f7fb;--rule:#e4e7ee;--rule-soft:#eef1f6;--ui:"Inter Tight",system-ui,sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f5f8;color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.frame{background:var(--paper);border:1px solid var(--rule);border-radius:22px;box-shadow:0 20px 60px -30px rgba(0,0,0,.3);max-width:920px;width:100%;padding:34px 38px 28px}
.kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-1)}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px}
.cap{color:var(--muted);font-size:15px;margin-bottom:18px}
.dgm{width:100%;height:auto;display:block}
.note{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:18px;border-top:1px solid var(--rule);padding-top:14px}
.back{margin-top:24px;font-family:var(--mono);font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:var(--c-1)}
</style></head>
<body>
<div class="frame">
  <div class="kick">// bullet diagram</div>
  <h1>Terčový graf</h1>
  <p class="cap">Hodnota proti cíli.</p>
  <svg class="dgm" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg"><text x="166" y="84" text-anchor="end" font-family="var(--ui)" font-size="13" font-weight="600" fill="var(--ink)">Tržby</text><rect x="180" y="70" width="540" height="28" rx="5" fill="var(--soft)"/><rect x="180" y="76" width="421" height="16" rx="4" fill="var(--c-1)"/><rect x="664" y="66" width="4" height="36" fill="var(--ink)"/><text x="166" y="154" text-anchor="end" font-family="var(--ui)" font-size="13" font-weight="600" fill="var(--ink)">Marže</text><rect x="180" y="140" width="540" height="28" rx="5" fill="var(--soft)"/><rect x="180" y="146" width="335" height="16" rx="4" fill="var(--c-1)"/><rect x="502" y="136" width="4" height="36" fill="var(--ink)"/><text x="166" y="224" text-anchor="end" font-family="var(--ui)" font-size="13" font-weight="600" fill="var(--ink)">NPS</text><rect x="180" y="210" width="540" height="28" rx="5" fill="var(--soft)"/><rect x="180" y="216" width="259" height="16" rx="4" fill="var(--c-1)"/><rect x="448" y="206" width="4" height="36" fill="var(--ink)"/></svg>
  <div class="note">// data-driven SVG &middot; ukázková data (dummy) &middot; uprav data v build/content.py</div>
</div>
<a class="back" href="../../index.html">&larr; zpět na galerii</a>
</body></html>
