<!doctype html>
<html lang="cs"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sklonový graf diagram</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230e9e8e'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
:root{--c-1:#0e9e8e;--c-2:#2f6bff;--c-3:#e0468a;--c-4:#f0883a;--c-5:#e0468a;--ink:#1c2230;--muted:#6b7280;--paper:#fff;--soft:#f5f7fb;--rule:#e4e7ee;--rule-soft:#eef1f6;--ui:"Inter Tight",system-ui,sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f5f8;color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.frame{background:var(--paper);border:1px solid var(--rule);border-radius:22px;box-shadow:0 20px 60px -30px rgba(0,0,0,.3);max-width:920px;width:100%;padding:34px 38px 28px}
.kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-1)}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px}
.cap{color:var(--muted);font-size:15px;margin-bottom:18px}
.dgm{width:100%;height:auto;display:block}
.note{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:18px;border-top:1px solid var(--rule);padding-top:14px}
.back{margin-top:24px;font-family:var(--mono);font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:var(--c-1)}
</style></head>
<body>
<div class="frame">
  <div class="kick">// slope diagram</div>
  <h1>Sklonový graf</h1>

  <svg class="dgm" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg"><text x="220" y="36" text-anchor="middle" font-family="var(--ui)" font-size="14" font-weight="700" fill="var(--ink)">2025</text><text x="580" y="36" text-anchor="middle" font-family="var(--ui)" font-size="14" font-weight="700" fill="var(--ink)">2026</text><line x1="220" y1="170" x2="580" y2="60" stroke="var(--c-1)" stroke-width="3"/><circle cx="220" cy="170" r="6" fill="var(--c-1)"/><circle cx="580" cy="60" r="6" fill="var(--c-1)"/><text x="206" y="174.0" text-anchor="end" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">Tržby</text><text x="594" y="64.0" text-anchor="start" font-family="var(--ui)" font-size="12" font-weight="600" fill="var(--ink)">180</text><line x1="220" y1="225" x2="580" y2="234" stroke="var(--c-2)" stroke-width="3"/><circle cx="220" cy="225" r="6" fill="var(--c-2)"/><circle cx="580" cy="234" r="6" fill="var(--c-2)"/><text x="206" y="229.0" text-anchor="end" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">Náklady</text><text x="594" y="238.16666666666666" text-anchor="start" font-family="var(--ui)" font-size="12" font-weight="600" fill="var(--ink)">85</text><line x1="220" y1="335" x2="580" y2="216" stroke="var(--c-3)" stroke-width="3"/><circle cx="220" cy="335" r="6" fill="var(--c-3)"/><circle cx="580" cy="216" r="6" fill="var(--c-3)"/><text x="206" y="339.0" text-anchor="end" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--ink)">Zisk</text><text x="594" y="219.83333333333334" text-anchor="start" font-family="var(--ui)" font-size="12" font-weight="600" fill="var(--ink)">95</text></svg>
  <div class="note">// data-driven SVG &middot; ukázková data (dummy) &middot; uprav data v build/content.py</div>
</div>

</body></html>
