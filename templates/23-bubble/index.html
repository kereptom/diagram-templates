<!doctype html>
<html lang="cs"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bublinový graf diagram</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23e0468a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
:root{--c-1:#e0468a;--c-2:#2f6bff;--c-3:#0e9e8e;--c-4:#f0883a;--c-5:#e0468a;--ink:#1c2230;--muted:#6b7280;--paper:#fff;--soft:#f5f7fb;--rule:#e4e7ee;--rule-soft:#eef1f6;--ui:"Inter Tight",system-ui,sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f5f8;color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.frame{background:var(--paper);border:1px solid var(--rule);border-radius:22px;box-shadow:0 20px 60px -30px rgba(0,0,0,.3);max-width:920px;width:100%;padding:34px 38px 28px}
.kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-1)}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px}
.cap{color:var(--muted);font-size:15px;margin-bottom:18px}
.dgm{width:100%;height:auto;display:block}
.note{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:18px;border-top:1px solid var(--rule);padding-top:14px}
.back{margin-top:24px;font-family:var(--mono);font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:var(--c-1)}
</style></head>
<body>
<div class="frame">
  <div class="kick">// bubble diagram</div>
  <h1>Bublinový graf</h1>
  <p class="cap">Tři rozměry v jednom.</p>
  <svg class="dgm" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg"><rect x="110" y="40" width="360" height="360" fill="var(--soft)"/><line x1="110" y1="40" x2="470" y2="40" stroke="var(--rule)" stroke-width="1"/><line x1="110" y1="130" x2="470" y2="130" stroke="var(--rule)" stroke-width="1"/><line x1="110" y1="220" x2="470" y2="220" stroke="var(--rule)" stroke-width="1"/><line x1="110" y1="310" x2="470" y2="310" stroke="var(--rule)" stroke-width="1"/><line x1="110" y1="400" x2="470" y2="400" stroke="var(--rule)" stroke-width="1"/><circle cx="200" cy="184" r="32" fill="var(--c-1)" opacity="0.55"/><text x="200.0" y="188.0" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="600" fill="var(--ink)">A</text><circle cx="308" cy="256" r="43" fill="var(--c-2)" opacity="0.55"/><text x="308.0" y="260.0" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="600" fill="var(--ink)">B</text><circle cx="380" cy="130" r="25" fill="var(--c-3)" opacity="0.55"/><text x="380.0" y="134.0" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="600" fill="var(--ink)">C</text><circle cx="254" cy="328" r="36" fill="var(--c-4)" opacity="0.55"/><text x="254.0" y="332.0" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="600" fill="var(--ink)">D</text></svg>
  <div class="note">// data-driven SVG &middot; ukázková data (dummy) &middot; uprav data v build/content.py</div>
</div>
<a class="back" href="../../index.html">&larr; zpět na galerii</a>
</body></html>
