<!doctype html>
<html lang="cs"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teploměr diagram</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23e0468a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
:root{--c-1:#e0468a;--c-2:#5b6cf0;--c-3:#0e9e8e;--c-4:#f0883a;--c-5:#e0468a;--ink:#1c2230;--muted:#6b7280;--paper:#fff;--soft:#f5f7fb;--rule:#e4e7ee;--rule-soft:#eef1f6;--ui:"Inter Tight",system-ui,sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f5f8;color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.frame{background:var(--paper);border:1px solid var(--rule);border-radius:22px;box-shadow:0 20px 60px -30px rgba(0,0,0,.3);max-width:920px;width:100%;padding:34px 38px 28px}
.kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-1)}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px}
.cap{color:var(--muted);font-size:15px;margin-bottom:18px}
.dgm{width:100%;height:auto;display:block}
.note{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:18px;border-top:1px solid var(--rule);padding-top:14px}
.back{margin-top:24px;font-family:var(--mono);font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:var(--c-1)}
</style></head>
<body>
<div class="frame">
  <div class="kick">// thermometer diagram</div>
  <h1>Teploměr</h1>
  <p class="cap">Plnění sbírky či cíle.</p>
  <svg class="dgm" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg"><rect x="226" y="50" width="48" height="300" rx="24" fill="var(--rule-soft)"/><rect x="226" y="158" width="48" height="192" rx="24" fill="var(--c-1)"/><circle cx="250" cy="380" r="40" fill="var(--c-1)"/><line x1="280" y1="50" x2="294" y2="50" stroke="var(--rule)"/><text x="302" y="54.0" text-anchor="start" font-family="var(--ui)" font-size="11" font-weight="500" fill="var(--muted)">100%</text><line x1="280" y1="110" x2="294" y2="110" stroke="var(--rule)"/><text x="302" y="114.0" text-anchor="start" font-family="var(--ui)" font-size="11" font-weight="500" fill="var(--muted)">80%</text><line x1="280" y1="170" x2="294" y2="170" stroke="var(--rule)"/><text x="302" y="174.0" text-anchor="start" font-family="var(--ui)" font-size="11" font-weight="500" fill="var(--muted)">60%</text><line x1="280" y1="230" x2="294" y2="230" stroke="var(--rule)"/><text x="302" y="234.0" text-anchor="start" font-family="var(--ui)" font-size="11" font-weight="500" fill="var(--muted)">40%</text><line x1="280" y1="290" x2="294" y2="290" stroke="var(--rule)"/><text x="302" y="294.0" text-anchor="start" font-family="var(--ui)" font-size="11" font-weight="500" fill="var(--muted)">20%</text><line x1="280" y1="350" x2="294" y2="350" stroke="var(--rule)"/><text x="302" y="354.0" text-anchor="start" font-family="var(--ui)" font-size="11" font-weight="500" fill="var(--muted)">0%</text><text x="450" y="180" text-anchor="middle" font-family="var(--ui)" font-size="46" font-weight="800" fill="var(--c-1)">64%</text><text x="450" y="215" text-anchor="middle" font-family="var(--ui)" font-size="14" font-weight="500" fill="var(--muted)">z cílové částky</text></svg>
  <div class="note">// data-driven SVG &middot; ukázková data (dummy) &middot; uprav data v build/content.py</div>
</div>
<a class="back" href="../../index.html">&larr; zpět na galerii</a>
</body></html>
