<!doctype html>
<html lang="cs"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plošný graf diagram</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230e9e8e'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
:root{--c-1:#0e9e8e;--c-2:#5b6cf0;--c-3:#0e9e8e;--c-4:#f0883a;--c-5:#e0468a;--ink:#1c2230;--muted:#6b7280;--paper:#fff;--soft:#f5f7fb;--rule:#e4e7ee;--ui:"Inter Tight",system-ui,sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f5f8;color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.frame{background:var(--paper);border:1px solid var(--rule);border-radius:22px;box-shadow:0 20px 60px -30px rgba(0,0,0,.3);max-width:920px;width:100%;padding:34px 38px 28px}
.kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-1)}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px}
.cap{color:var(--muted);font-size:15px;margin-bottom:18px}
.dgm{width:100%;height:auto;display:block}
.note{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:18px;border-top:1px solid var(--rule);padding-top:14px}
.back{margin-top:24px;font-family:var(--mono);font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:var(--c-1)}
</style></head>
<body>
<div class="frame">
  <div class="kick">// area diagram</div>
  <h1>Plošný graf</h1>
  <p class="cap">Objem pod křivkou.</p>
  <svg class="dgm" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg"><line x1="64" y1="46" x2="754" y2="46" stroke="var(--rule)" stroke-width="1"/><line x1="64" y1="126" x2="754" y2="126" stroke="var(--rule)" stroke-width="1"/><line x1="64" y1="206" x2="754" y2="206" stroke="var(--rule)" stroke-width="1"/><line x1="64" y1="286" x2="754" y2="286" stroke="var(--rule)" stroke-width="1"/><line x1="64" y1="366" x2="754" y2="366" stroke="var(--rule)" stroke-width="1"/><polygon points="64,366 64,233 179,166 294,197 409,99 524,46 639,122 754,188 754,366" fill="var(--c-1)" opacity="0.18"/><polyline points="64,233 179,166 294,197 409,99 524,46 639,122 754,188" fill="none" stroke="var(--c-1)" stroke-width="3.5"/><text x="64.0" y="390" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--muted)">Po</text><text x="179.0" y="390" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--muted)">Út</text><text x="294.0" y="390" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--muted)">St</text><text x="409.0" y="390" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--muted)">Čt</text><text x="524.0" y="390" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--muted)">Pá</text><text x="639.0" y="390" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--muted)">So</text><text x="754.0" y="390" text-anchor="middle" font-family="var(--ui)" font-size="12" font-weight="500" fill="var(--muted)">Ne</text></svg>

</div>

</body></html>
